<!DOCTYPE html>
<html>
<head>
    <title>Billion Point Spatial Grid</title>
    <style>
        body, canvas { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-family: monospace; color: #0f0; }
        .controls { background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #333; border-radius: 4px; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="controls">
            <strong>System: Spatial Hash Grid</strong><br>
            Points: <span id="count">0</span><br><br>
            <button id="add_btn">Add 10,000,000 Points</button>
            <button id="clear_btn">Clear</button>
            <p style="color: #666; font-size: 10px;">Note: 1B points requires >8GB RAM.<br>Browsers usually cap at 4GB.</p>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const countEl = document.getElementById("count");

        // Use TypedArrays to save memory
        // x1, y1, x2, y2...
        let points = new Float32Array(0); 
        let numPoints = 0;

        // Spatial Grid Settings
        const cellSize = 50; 
        let grid = {}; 

        let mouse = { x: -1000, y: -1000 };
        const radius = 50;

        function initPoints(n) {
            const newPoints = new Float32Array((numPoints + n) * 2);
            newPoints.set(points);
            
            for (let i = numPoints; i < numPoints + n; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                newPoints[i * 2] = x;
                newPoints[i * 2 + 1] = y;

                // Add to spatial grid
                const gx = Math.floor(x / cellSize);
                const gy = Math.floor(y / cellSize);
                const key = `${gx},${gy}`;
                if (!grid[key]) grid[key] = [];
                grid[key].push(i);
            }
            
            points = newPoints;
            numPoints += n;
            countEl.innerText = numPoints.toLocaleString();
            renderStatic();
        }

        // Render 100M+ points to a bitmap
        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d', { alpha: false });

        function renderStatic() {
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
            const imgData = offCtx.createImageData(offscreen.width, offscreen.height);
            const data = imgData.data;

            for (let i = 0; i < numPoints; i++) {
                const px = Math.round(points[i * 2]);
                const py = Math.round(points[i * 2 + 1]);
                
                const index = (py * offscreen.width + px) * 4;
                data[index] = 255;     // R
                data[index + 1] = 0;   // G
                data[index + 2] = 0;   // B
                data[index + 3] = 255; // A
            }
            offCtx.putImageData(imgData, 0, 0);
            draw();
        }

        function draw() {
            ctx.drawImage(offscreen, 0, 0);

            // Selection Logic
            const r2 = radius * radius;
            ctx.fillStyle = "#0f0";
            
            // Search only neighboring cells in the grid
            const gx_start = Math.floor((mouse.x - radius) / cellSize);
            const gx_end = Math.floor((mouse.x + radius) / cellSize);
            const gy_start = Math.floor((mouse.y - radius) / cellSize);
            const gy_end = Math.floor((mouse.y + radius) / cellSize);

            for (let x = gx_start; x <= gx_end; x++) {
                for (let y = gy_start; y <= gy_end; y++) {
                    const key = `${x},${y}`;
                    const cell = grid[key];
                    if (cell) {
                        for (let i = 0; i < cell.length; i++) {
                            const idx = cell[i];
                            const px = points[idx * 2];
                            const py = points[idx * 2 + 1];
                            
                            const dx = px - mouse.x;
                            const dy = py - mouse.y;
                            if (dx * dx + dy * dy < r2) {
                                ctx.fillRect(px - 1, py - 1, 3, 3);
                            }
                        }
                    }
                }
            }

            ctx.strokeStyle = "#fff";
            ctx.strokeRect(mouse.x - radius, mouse.y - radius, radius * 2, radius * 2);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            draw();
        });

        document.getElementById('add_btn').addEventListener('click', () => {
            initPoints(10000000); // Adding 10M at a time for stability
        });

        document.getElementById('clear_btn').addEventListener('click', () => {
            points = new Float32Array(0);
            numPoints = 0;
            grid = {};
            countEl.innerText = "0";
            renderStatic();
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderStatic();
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
