<html>
    <head>
        <title>2D Boundary - QuadTree</title>
        <style>
            body, canvas {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #f0f0f0;
            } 
            #controls {
                position: absolute;
                top: 10px;
                left: 10px;
                background: rgba(255, 255, 255, 0.8);
                padding: 10px;
                border-radius: 5px;
                display: flex;
                flex-direction: column;
                gap: 5px;
                z-index: 10;
            }
            label {
                font-family: sans-serif;
                font-size: 14px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
            }
        </style>
    </head>
    <body>
        <div id="controls">
            <button id="clear_btn">Clear</button>
            <button id="random_btn">Generate 10000 Points</button>
            <button id="random_btn2">Generate 1000000 Points</button>
            <label>
                <input type="checkbox" id="grid_checkbox" checked> Show QuadTree Grid
            </label>
        </div>
        
        <canvas id="canvas"></canvas>

        <script>
            var point =(x=0, y=0) => ({x,y});

            var boundary = (x=0, y=0, w=0,h=0) =>(
            { x, 
              y,
              w, // half width
              h, // half height
              isNorthWest:function(pickPoint){
                var northWestX =  pickPoint.x >= this.northWest().x;
                var northWestY =  pickPoint.y >= this.northWest().y;
                return northWestX && northWestY;
              }, 
              isSouthEast:function(pickPoint){
                var southEastX = pickPoint.x <= this.southEast().x;
                var southEastY = pickPoint.y <= this.southEast().y;
                return southEastX && southEastY;
              },
  
              northWest:function(){return point(this.x-this.w, this.y-this.h)},
              southEast:function(){return point(this.x+this.w, this.y+this.h)},

              is_inner_bound_northwest_greater_than_outer_bound_southeast:function(inner_bound){
                var step1 = inner_bound.northWest().x > this.southEast().x;
                var step3 = inner_bound.northWest().y > this.southEast().y;
                return step1 || step3;
              },

              is_inner_bound_southeast_lesser_than_outer_bound_northwest:function(inner_bound){
                var step2 = inner_bound.southEast().x < this.northWest().x;
                var step4 = inner_bound.southEast().y < this.northWest().y;
                return step2 || step4;
              },

              contains:function(picKPoint){
                var is_contain_between_northWest_and_southEast = this.isNorthWest(picKPoint) && this.isSouthEast(picKPoint);
                return is_contain_between_northWest_and_southEast;
              },

              intersects:function(inner_bound){
                  return !(this.is_inner_bound_northwest_greater_than_outer_bound_southeast(inner_bound)|| this.is_inner_bound_southeast_lesser_than_outer_bound_northwest(inner_bound));
              }
        });

        class Quadtree {
            constructor(boundd, capacity) {
                this.boundary = boundd;
                this.capacity = capacity;
                this.points = [];
                this.divided = false;
            }

            subdivide() {
                let x = this.boundary.x;
                let y = this.boundary.y;
                let w = this.boundary.w / 2;
                let h = this.boundary.h / 2;

                this.northwest = new Quadtree(boundary(x - w, y - h, w, h), this.capacity);
                this.northeast = new Quadtree(boundary(x + w, y - h, w, h), this.capacity);
                this.southwest = new Quadtree(boundary(x - w, y + h, w, h), this.capacity);
                this.southeast = new Quadtree(boundary(x + w, y + h, w, h), this.capacity);

                this.divided = true;
            }

            insert(point) {
                if (!this.boundary.contains(point)) {
                    return false;
                }

                if (this.points.length < this.capacity) {
                    this.points.push(point);
                    return true;
                } else {
                    if (!this.divided) {
                        this.subdivide();
                    }

                    if (this.northwest.insert(point)) return true;
                    if (this.northeast.insert(point)) return true;
                    if (this.southwest.insert(point)) return true;
                    if (this.southeast.insert(point)) return true;
                }
            }

            query(range, found = []) {
                if (!this.boundary.intersects(range)) {
                    return found;
                } else {
                    for (var p of this.points) {
                        if (range.contains(p)) {
                            found.push(p);
                        }
                    }
                    if (this.divided) {
                        this.northwest.query(range, found);
                        this.northeast.query(range, found);
                        this.southwest.query(range, found);
                        this.southeast.query(range, found);
                    }
                }
                return found;
            }

            show(ctx) {
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 0.5;
                // quadtree boundary
                ctx.strokeRect(
                    this.boundary.x - this.boundary.w,
                    this.boundary.y - this.boundary.h,
                    this.boundary.w * 2,
                    this.boundary.h * 2
                );

                if (this.divided) {
                    this.northwest.show(ctx);
                    this.northeast.show(ctx);
                    this.southwest.show(ctx);
                    this.southeast.show(ctx);
                }

                // Draw points
                for (let p of this.points) {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        var c = document.getElementById("canvas");
        var c2d = c.getContext("2d");
        var gridCheckbox = document.getElementById("grid_checkbox");
        var radius = 50.0;
        var mouse = {x:-1000, y:-1000};
        var points = [];
        var qt; 

        function draw(){
            c2d.clearRect(0, 0, c.width, c.height);

            if(qt !== undefined) {
                // If checkbox is checked, use the quadtree's recursive show method
                if (gridCheckbox.checked) {
                    qt.show(c2d);
                } else {
                    // Just draw points manually if grid is hidden to keep performance
                    for (let p of points) {
                        c2d.fillStyle = '#ff0000';
                        c2d.beginPath();
                        c2d.arc(p.x, p.y, 1, 0, Math.PI * 2);
                        c2d.fill();
                    }
                }
            }
            
            var range = boundary(mouse.x, mouse.y, radius, radius);
            c2d.strokeStyle = 'rgb(255, 0, 0)';
            c2d.lineWidth = 2;
            c2d.strokeRect(range.x - range.w, range.y - range.h, range.w * 2, range.h * 2);

            if(qt !== undefined){
                var found = qt.query(range);
                for (let p of found) {
                    c2d.fillStyle = '#00ff00';
                    c2d.beginPath();
                    c2d.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    c2d.fill();
                } 
            } 
        }

        function updateTree(){
            var bound = boundary(c.width/2,c.height/2,c.width/2,c.height/2);
            // Increased capacity for 1M points to prevent stack overflow in visualization
            var cap = points.length > 50000 ? 50 : 4; 
            qt = new Quadtree(bound, cap);
            for(var p of points){
                qt.insert(p);
            }
            draw();
        }

        function resize(){
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            if(points.length > 0) updateTree();
            else draw();
        }

        window.addEventListener('resize', resize);

        c.addEventListener('mousemove',(e)=>{
            var rect = c.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            draw();
        });

        c.addEventListener('mousedown',(e)=>{
            var rect = c.getBoundingClientRect();
            var p = point(e.clientX - rect.left, e.clientY - rect.top);
            points.push(p);
            updateTree();
        });

        gridCheckbox.addEventListener('change', draw);

        var clear_btn = document.getElementById("clear_btn");
        var random_btn = document.getElementById("random_btn");
        var random_btn2 = document.getElementById("random_btn2");
        
        random_btn.addEventListener('click',(e)=>{
            for(var i = 0; i < 10000; i++){
                var x = Math.random() * c.width;
                var y = Math.random() * c.height;
                points.push({x:x, y:y});
            }
            updateTree();
        });

        random_btn2.addEventListener('click',(e)=>{
            // Optimization: generate 1M points
            for(var i = 0; i < 1000000; i++){
                var x = Math.random() * c.width;
                var y = Math.random() * c.height;
                points.push({x:x, y:y});
            }
            updateTree();
        });

        clear_btn.addEventListener('click',(e)=>{
            points = [];
            updateTree();
        });

        resize();
        </script>
    </body>
</html>
