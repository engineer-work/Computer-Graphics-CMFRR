             step1 = boundary2.x - boundary2.w > boundary1.x + boundary1.w

             step4 = boundary2.y + boundary2.h < boundary1.y - boundary1.h      
                   = boundary2_SouthEastY < boundary2_NorthWestY  // Checking Y value of SouthEast Mouse Curse Selection boundary lesser than NorthWest region of Y value of Canvas boundary

        class Quadtree {
            constructor(boundd, capacity) {
                this.boundary = boundd;
                this.capacity = capacity;
                this.points = [];
                this.divided = false;
            }

            subdivide() {
                let x = this.boundary.x;
                let y = this.boundary.y;
                let w = this.boundary.w / 2;
                let h = this.boundary.h / 2;

                  /*
              (x-w, y-h)                  (x+w,y-h)    
              NorthWest-------North-------NorthEast  
                  |                            |   
                  |                            | 
                 West                         East
                  |                            |
                  |                            |                         
              SouthWest-------South-------SouthEast 
              (x-w, y+h)                  (x+w,y+h) 
              */



                this.northwest = new Quadtree(boundary(x - w, y - h, w, h), this.capacity);
                this.northeast = new Quadtree(boundary(x + w, y - h, w, h), this.capacity);
                this.southwest = new Quadtree(boundary(x - w, y + h, w, h), this.capacity);
                this.southeast = new Quadtree(boundary(x + w, y + h, w, h), this.capacity);

                this.divided = true;
            }

            insert(point) {

                  
                // if boundary not contains any given points, it should move out from the insert method. and report as done as false.

                if (!this.boundary.contains(point)) {
                    return false;
                }

              

/*
                // if, points less than the given capacity, should push to point list, and report as done as true.
                // if, points great than the given capacity, want to do. recursive 
                            1. check divided condition.
                            2. check insert point condition on 4 direction of northwest, northeast, southwest, southeast and report as done as true.
                */

                if (this.points.length < this.capacity) {
                    this.points.push(point);
                    return true;
                } else {
                    if (!this.divided) {
                        this.subdivide();
                    }

                    if (this.northwest.insert(point)) return true;
                    if (this.northeast.insert(point)) return true;
                    if (this.southwest.insert(point)) return true;
                    if (this.southeast.insert(point)) return true;
                }
            }

           

             query(range, found = []) {
                if (!this.boundary.intersects(range)) {
                    return found;
                } else {
                    for (var p of this.points) {
                        if (range.contains(p)) {
                            found.push(p);
                        }
                    }
                    if (this.divided) {
                        this.northwest.query(range, found);
                        this.northeast.query(range, found);
                        this.southwest.query(range, found);
                        this.southeast.query(range, found);
                    }
                }
                return found;
            }

            show(ctx) {
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 1;
                // quadtree boundary
                ctx.strokeRect(
                    this.boundary.x - this.boundary.w,
                    this.boundary.y - this.boundary.h,
                    this.boundary.w * 2,
                    this.boundary.h * 2
                );

                // If divided, show subdivisions, points will be drawn on top
                if (this.divided) {
                    this.northwest.show(ctx);
                    this.northeast.show(ctx);
                    this.southwest.show(ctx);
                    this.southeast.show(ctx);
                }

                // Draw points, if mouse clicked here, they will be highlighted in the query function
                for (let p of this.points) {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

             
            }
        }

    function updateTree(){
        var bound = boundary(c.width/2,c.height/2,c.width/2,c.height/2);
